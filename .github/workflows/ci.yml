name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --prod --audit-level moderate
      - run: pnpm drizzle:check

      - name: Verify generated migrations are committed
        shell: bash
        run: |
          pnpm drizzle:generate
          test -z "$(git status --porcelain -- server/database/migrations)"

      - run: pnpm test tests/server/architecture/layer-boundaries.test.ts
      - run: pnpm test
      - run: pnpm typecheck
      - run: pnpm build
